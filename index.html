<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudiaConMe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 2rem; color: #1a1a2e; margin-bottom: 8px; }
  .subtitle { color: #555; margin-bottom: 40px; }
  .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .card { background: white; border-radius: 20px; padding: 40px 32px; text-align: center; width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.14); }
  .card .emoji { font-size: 4rem; display: block; margin-bottom: 16px; }
  .card h2 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 8px; }
  .card p { color: #777; font-size: 0.9rem; }
  .card.ilaria { border-top: 5px solid #7c3aed; }
  .card.emma { border-top: 5px solid #db2777; }
  footer { margin-top: 60px; color: #aaa; font-size: 0.8rem; }
</style>
</head>
<body>
  <h1>📚 StudiaConMe</h1>
  <p class="subtitle">Le app di studio di Ilaria ed Emma</p>
  <div class="cards">
    <a href="ilaria/" class="card ilaria">
      <span class="emoji">👧</span>
      <h2>Ilaria</h2>
      <p>5ª Elementare</p>
    </a>
    <a href="emma/" class="card emma">
      <span class="emoji">👩</span>
      <h2>Emma</h2>
      <p>3ª Elementare</p>
    </a>
  </div>
  <footer>© Giorgio Bernoni — github.com/bernonigiorgio-max/studia-con-me</footer>
</body>
</html>
